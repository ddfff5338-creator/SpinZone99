<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpinZone - Sign Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a14;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: #11112a;
      border-bottom: 1px solid #2a2a5a;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      color: #a855f7;
      text-decoration: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }

    .signup-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      padding: 2rem;
    }

    .signup-box {
      background: #11112a;
      border: 1px solid #2a2a5a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .signup-box h2 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }

    .signup-box p {
      text-align: center;
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #ccc;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0a0a14;
      border: 1px solid #2a2a5a;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .input-group input:focus {
      border-color: #a855f7;
    }

    .error-msg {
      background: #3a1a1a;
      border: 1px solid #7a2a2a;
      color: #ff6b6b;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .success-msg {
      background: #1a3a1a;
      border: 1px solid #2a7a2a;
      color: #4ade80;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    .login-link a {
      color: #a855f7;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">⚡ SpinZone</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="signup-container">
    <div class="signup-box">

      <h2>Create Account</h2>
      <p>Join SpinZone and start trading!</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password" />
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" />
      </div>

      <button class="btn-primary" onclick="handleSignup()">Create Account</button>

      <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
      </div>

    </div>
  </div>

  <script>
    async function handleSignup() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      // Hide previous messages
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // Basic validation
      if (!username || !password || !confirmPassword) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '❌ Please fill in all fields';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '❌ Passwords do not match';
        return;
      }

      if (password.length < 6) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '❌ Password must be at least 6 characters';
        return;
      }

      // Send to server
      try {
        const response = await fetch('https://spinzone99-production.up.railway.app/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.style.display = 'block';
          successMsg.textContent = '✅ Account created! Redirecting to login...';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = '❌ ' + data.error;
        }

      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = '❌ Could not connect to server. Is it running?';
      }
    }
  </script>

</body>
</html>
